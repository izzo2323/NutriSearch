services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrition}
      POSTGRES_USER: ${POSTGRES_USER:-nutrition}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrition}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/migrations:/migrations
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutrition}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nutrition}:${POSTGRES_PASSWORD:-nutrition}@db:5432/${POSTGRES_DB:-nutrition}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  scraper:
    build: ./scraper
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nutrition}:${POSTGRES_PASSWORD:-nutrition}@db:5432/${POSTGRES_DB:-nutrition}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scraper:/app
    profiles:
      - scraper

volumes:
  postgres_data:
